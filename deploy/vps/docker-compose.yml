services:
  app:
    build:
      context: ../..
      dockerfile: deploy/vps/docker/php-apache/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      TZ: ${APP_TIMEZONE:-America/Sao_Paulo}
      APP_DEBUG: ${APP_DEBUG:-0}
      SITE_URL: ${SITE_URL}
      BASE_URL: ${BASE_URL}
      DB_HOST: ${DB_HOST:-db}
      DB_NAME: ${DB_NAME:-telegram_bot}
      DB_USER: ${DB_USER:-telegram_bot}
      DB_PASS: ${DB_PASS}
      ECOMPAG_CLIENT_ID: ${ECOMPAG_CLIENT_ID:-}
      ECOMPAG_CLIENT_SECRET: ${ECOMPAG_CLIENT_SECRET:-}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_GROUP_ID: ${TELEGRAM_GROUP_ID:-}
      DEFAULT_PRODUCT_NAME: ${DEFAULT_PRODUCT_NAME:-Acesso VIP - 30 dias}
      DEFAULT_PRODUCT_DESCRIPTION: ${DEFAULT_PRODUCT_DESCRIPTION:-Acesso completo ao grupo por 30 dias}
      DEFAULT_PRODUCT_PRICE: ${DEFAULT_PRODUCT_PRICE:-29.90}
      DEFAULT_PRODUCT_DAYS: ${DEFAULT_PRODUCT_DAYS:-30}
      EMAIL_FROM: ${EMAIL_FROM:-no-reply@seu-dominio.com}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-Seu Projeto}
      EMAIL_SUBJECT: ${EMAIL_SUBJECT:-Pagamento Confirmado - Acesso Liberado!}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL:-}
      N8N_SECRET: ${N8N_SECRET:-}
      N8N_TIMEOUT: ${N8N_TIMEOUT:-15}
    ports:
      - "127.0.0.1:${APP_HTTP_PORT:-8080}:80"
    volumes:
      - ../..:/var/www/html

  db:
    image: mariadb:11.4
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      TZ: ${APP_TIMEZONE:-America/Sao_Paulo}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-telegram_bot}
      MYSQL_USER: ${DB_USER:-telegram_bot}
      MYSQL_PASSWORD: ${DB_PASS}
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 12
    volumes:
      - db_data:/var/lib/mysql
      - ../../database.sql:/docker-entrypoint-initdb.d/01-database.sql:ro
      - ../../database_update_funis.sql:/docker-entrypoint-initdb.d/02-database_update_funis.sql:ro
      - ../../files/database_admin.sql:/docker-entrypoint-initdb.d/03-database_admin.sql:ro

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    environment:
      TZ: ${APP_TIMEZONE:-America/Sao_Paulo}
      GENERIC_TIMEZONE: ${APP_TIMEZONE:-America/Sao_Paulo}
      N8N_HOST: ${N8N_HOST}
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL:-https}
      N8N_EDITOR_BASE_URL: ${N8N_EDITOR_BASE_URL}
      WEBHOOK_URL: ${N8N_PUBLIC_WEBHOOK_URL}
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE:-true}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:-}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_DIAGNOSTICS_ENABLED: "false"
    ports:
      - "127.0.0.1:${N8N_HTTP_PORT:-5678}:5678"
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  db_data:
  n8n_data:
